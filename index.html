<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Native Canvas</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;700&display=swap" />
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#141218">
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', function() {
                navigator.serviceWorker.register('sw.js');
            });
        }
    </script>
</head>
<body style="margin:0;overflow:hidden;">
    <canvas id="app" style="display:block;width:100vw;height:100vh;touch-action:none"></canvas>
    
    <!-- DEV ONLY: This block will be replaced by the build script with production scripts -->
    <script type='module' id='dev-fw'>
        import * as NativeCanvas from '/framework/index.ts';
        window.NativeCanvas = NativeCanvas;
    </script>
    <script type="module" src="/example/main.ts" id="dev-app"></script>
</body>
</html>
